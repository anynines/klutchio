apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: servicebindings.anynines.com
spec:
  group: anynines.com
  scope: Namespaced
  names:
    kind: ServiceBinding
    plural: servicebindings
  defaultCompositionRef:
    name: a8s-servicebinding
  versions:
    - name: v1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          supported:
            - types:
                &serviceInstanceTypes [
                  "keyvalue",
                  "postgresql",
                  "mongodb",
                  "search",
                  "logme2",
                  "prometheus",
                  "messaging",
                  "mariadb",
                  "messaging",
                ]
          properties:
            spec:
              x-kubernetes-validations:
                # Validation for crossplane.compositionRef and serviceInstanceType combination.
                - rule: "((has(self.crossplane) && has(self.crossplane.compositionRef) && has(self.crossplane.compositionRef.name) &&
                    self.crossplane.compositionRef.name != '' &&
                    self.crossplane.compositionRef.name != 'a8s-servicebinding') ||
                    self.serviceInstanceType == 'postgresql')"
                  message: "Selected service instance type is not supported."
              properties:
                acceptsIncomplete:
                  type: boolean
                instanceRef:
                  type: string
                writeConnectionSecretToRef:
                  description: >-
                    Optional. Controls the name of the Secret written to the ServiceBinding's namespace
                    containing connection credentials. If set, the value of `name` is used as the Secret
                    name. If omitted, the composition falls back to a default name of the form
                    `{servicebinding-name}-pg-creds`.
                  type: object
                  properties:
                    name:
                      description: >-
                        Name of the Secret to write connection credentials into. If not specified,
                        the composition defaults to `{servicebinding-name}-pg-creds`.
                      type: string
                  required:
                    - name
                serviceInstanceType:
                  type: string
                  enum: *serviceInstanceTypes
              required:
                - instanceRef
                - serviceInstanceType
            status:
              type: object
              properties:
                managed:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true

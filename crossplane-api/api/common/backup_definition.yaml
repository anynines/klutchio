apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: backups.anynines.com
spec:
  group: anynines.com
  scope: Namespaced
  names:
    kind: Backup
    plural: backups
  defaultCompositionRef:
    name: a8s-backup     
  versions:
  - name: v1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        supported:
          - types: &serviceInstanceTypes ["keyvalue", "postgresql", "mongodb",
              "search", "logme2", "prometheus", "messaging", "mariadb"]
        properties:
          spec:
            x-kubernetes-validations:
                # Validation for crossplane.compositionRef and serviceInstanceType combination.
                - rule: "((has(self.crossplane) && has(self.crossplane.compositionRef) && has(self.crossplane.compositionRef.name) &&
                    self.crossplane.compositionRef.name != '' &&
                    self.crossplane.compositionRef.name != 'a8s-backup') ||
                    self.serviceInstanceType == 'postgresql')"
                  message: "Selected service instance type is not supported."
            properties:
              instanceRef:
                type: string
              serviceInstanceType:
                type: string
                enum: *serviceInstanceTypes
            required:
              - instanceRef
              - serviceInstanceType
          status:
            type: object
            properties:
              managed:
                type: object
                x-kubernetes-preserve-unknown-fields: true
